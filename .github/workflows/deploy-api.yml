name: Deploy API → Docker Hub

on:
  push:
    branches: [main]
    paths:
      - 'Controllers/**'
      - 'Models/**'
      - 'Data/**'
      - 'Services/**'
      - 'Program.cs'
      - 'Dockerfile.deploy'
      - '*.csproj'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.deploy
          push: true
          tags: vinitol751/rdo-api:latest
